<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Tasks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ManageTask.css') }}">
</head>
<body>

<header>
    <h1>Task Manager</h1>
    <nav>
        <a href="{{ url_for('account.manage_account') }}">Account</a>
    </nav>
</header>

<div class="container">

    <!-- Add Task -->
    <form method="POST">
        <input type="text" name="task" placeholder="Enter new task" required>
        <button type="submit">Add Task</button>
    </form>

    <!-- Task List -->
    <ul>
        {% for task in tasks %}
            <li>
                {{ task.task }} - {{ task.status }}
            </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
