<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Task Managers 2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forget_password.css') }}">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email to receive an OTP code.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-area">
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" id="forgetForm" novalidate>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="Enter your email" required>
                    <small class="error-text" id="emailError"></small>
                </div>

                <button type="submit" id="sendOtpButton">Send OTP</button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('login.login') }}">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/forget_password.js') }}"></script>
</body>
</html>
