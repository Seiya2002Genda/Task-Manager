<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Task Managers 2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset_password.css') }}">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <p class="subtitle">Choose a new secure password.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-area">
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" id="resetPasswordForm" novalidate>
                <div class="input-group">
                    <label for="password">New Password</label>
                    <input id="password" type="password" name="password" placeholder="Enter new password" required>
                    <small class="error-text" id="passwordError"></small>
                </div>

                <div class="input-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm new password" required>
                    <small class="error-text" id="confirmPasswordError"></small>
                </div>

                <button type="submit" id="resetButton">Reset Password</button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('login.login') }}">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/reset_password.js') }}"></script>
</body>
</html>
