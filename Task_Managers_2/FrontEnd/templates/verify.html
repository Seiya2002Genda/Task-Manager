<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Task Managers 2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/verify.css') }}">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h2>Verify OTP</h2>
            <p class="subtitle">Enter the 6-digit code sent to your email.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-area">
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" id="verifyForm" novalidate>
                <div class="input-group">
                    <label for="otp">OTP Code</label>
                    <input id="otp" type="text" name="otp" maxlength="6" placeholder="123456" required>
                    <small class="error-text" id="otpError"></small>
                </div>

                <button type="submit" id="verifyButton">Verify</button>
            </form>

            <div class="auth-links">
                <a href="{{ url_for('forget.forget') }}">Request New OTP</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/verify.js') }}"></script>
</body>
</html>
